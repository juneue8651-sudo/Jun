<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>동료들을 위한 TKS 영어 퀴즈</title>
    <style>
        /* 화면을 예쁘게 꾸미는 마법 (몰라도 됨) */
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f0f2f5; }
        .box { background: white; width: 300px; margin: auto; padding: 30px; border-radius: 20px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>✍️ 단어 퀴즈</h1>
        <h2 id="word">로딩 중...</h2>
        <input type="text" id="answer" placeholder="뜻을 입력하세요">
        <br>
        <button onclick="check()">확인</button>
        <p id="msg"></p>
    </div>

    <script>
        // 본인이 만든 words_section1.json 데이터를 여기에 직접 넣었습니다!
        const quiz = {
            "Acquisition": "인수",
            "Advocate": "지지하다",
            "Ambiguous": "모호한",
            "Collaborate": "협력하다",
            "Comprehensive": "종합적인"
        };
        const keys = Object.keys(quiz);
        let idx = 0;

        function show() {
            document.getElementById('word').innerText = keys[idx];
            document.getElementById('answer').value = "";
            document.getElementById('msg').innerText = "";
        }

        function check() {
            const user = document.getElementById('answer').value;
            if (user === quiz[keys[idx]]) {
                document.getElementById('msg').innerText = "✅ 정답!";
                setTimeout(() => { idx = (idx + 1) % keys.length; show(); }, 1000);
            } else {
                document.getElementById('msg').innerText = "❌ 틀렸어요! (정답: " + quiz[keys[idx]] + ")";
            }
        }
        show();
    </script>
</body>
</html>
